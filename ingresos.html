<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Ingreso - MoneyTrack</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div>
            <h1>MoneyTrack</h1>
            <p>Control de gastos personales</p>
        </div>
    </header>

    <nav class="nav">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="saldo.html">Saldo</a></li>
            <li><a href="ingresos.html">Ingresos</a></li>
            <li><a href="categoria.html">Categorías</a></li>
            <li><a href="gastos.html">Gastos</a></li>
            <li><a href="metas.html">Metas</a></li>
            <li><a href="administrar.html">Administrar</a></li>
        </ul>
    </nav>

    <section class="section">
        <div class="ingresos-intro">
            <h2>Registrar ingreso</h2>
            <p>Registra el dinero que recibes (sueldo, ventas, etc.)</p>
        </div>

        <form id="ingresos-form" class="ingresos-form">
            <div class="input-group">
                <label for="cantidad">Cantidad</label>
                <input 
                    type="number" 
                    id="cantidad" 
                    name="cantidad" 
                    placeholder="0.00" 
                    step="0.01"
                    min="0"
                    required
                >
            </div>

            <div class="input-group">
                <label for="fecha">Fecha</label>
                <input 
                    type="date" 
                    id="fecha" 
                    name="fecha" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="origen">¿A dónde ingresa? (Efectivo o Banco)</label>
                <select id="origen" name="origen" required>
                    <option value="">Selecciona el destino</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="banco">Banco</option>
                </select>
            </div>

            <div class="input-group">
                <label for="nota">Nota (opcional)</label>
                <input 
                    type="text" 
                    id="nota" 
                    name="nota" 
                    placeholder="Ej: Sueldo marzo, Venta..."
                >
            </div>

            <button type="submit" class="btn">Guardar ingreso</button>
        </form>
    </section>

    <footer class="footer">
        <p>MoneyTrack - Control de gastos personales</p>
    </footer>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();

        document.getElementById('ingresos-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const cantidad = parseFloat(document.getElementById('cantidad').value);
            const fecha = document.getElementById('fecha').value;
            const origen = document.getElementById('origen').value;
            const nota = document.getElementById('nota').value || null;

            let ingresos = JSON.parse(localStorage.getItem('ingresos') || '[]');
            ingresos.push({ cantidad, fecha, origen, nota });
            localStorage.setItem('ingresos', JSON.stringify(ingresos));

            alert('¡Ingreso registrado correctamente!');
            document.getElementById('ingresos-form').reset();
            document.getElementById('fecha').valueAsDate = new Date();
        });
    </script>
</body>
</html>
